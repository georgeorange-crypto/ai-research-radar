name: Daily AI Research Radar

on:
  schedule:
    # 06:30 Asia/Shanghai.
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    env:
      RADAR_TIMEZONE: Asia/Shanghai
      RADAR_RANK_LIMIT: "0"
      MODEL_MODE: single
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL }}
      KIMI_MODEL: ${{ vars.KIMI_MODEL }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      GLM_BASE_URL: ${{ vars.GLM_BASE_URL }}
      GLM_MODEL: ${{ vars.GLM_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        run: python run.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add report.md report.html reports data/raw data/processed
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: update daily AI research radar"
            git push
          fi
