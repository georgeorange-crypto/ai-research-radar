source_credibility:
  primary: 0.88
  aggregator: 0.72
  media: 0.62

official_hints:
  - arxiv.org
  - openreview.net
  - openai.com
  - anthropic.com
  - deepmind.google
  - research.google
  - meta.com
  - microsoft.com
  - nvidia.com
  - apple.com
  - stanford.edu
  - mit.edu
  - berkeley.edu
  - cmu.edu
  - princeton
  - neurips.cc
  - icml.cc
  - iclr.cc
  - aclweb.org
  - thecvf.com
  - ecva.net
  - roboticsconference.org
  - corl.org
  - github.com

score_fields:
  - global_score
  - personal_score
  - novelty
  - credibility
  - evidence_strength
  - trend_signal
  - interpretation_signal
  - conference_signal
  - institution_signal
  - authority_score
  - multi_source_confirmation
  - community_signal
  - actionability
  - hype_risk
  - research_relevance
  - method_relevance
  - project_relevance
  - learning_value

global_score_weights:
  novelty: 0.20
  credibility: 0.15
  conference_signal: 0.18
  institution_signal: 0.12
  multi_source_confirmation: 0.12
  community_signal: 0.08
  actionability: 0.10
  editorial_signal: 0.05

personal_score_weights:
  research_relevance: 0.40
  method_relevance: 0.20
  project_relevance: 0.15
  learning_value: 0.10
  actionability: 0.08
  authority_signal: 0.00
  conference_signal: 0.00

source_role_rules:
  no_direct_credibility_roles:
    - discovery
    - community
    - chinese_context
  credibility_roles:
    - paper_source
    - conference_authority
    - institution_authority
  editorial_roles:
    - editorial_analysis
    - industry_analysis
  actionability_roles:
    - code_actionability

multi_source_confirmation_score:
  two_quality_sources: 0.05
  three_quality_sources: 0.10
  four_or_more_quality_sources: 0.15

group_bonus:
  primary_research: 0.05
  other: -0.02

classification:
  fallback_section: highlights
  fallback_min_score: 0.45
  normalized_score_divisor: 4.0

tier_limits:
  must_read: 3
  skim: 8

tier_thresholds:
  must_read:
    personal_score_min: 0.85
    research_relevance_min: 0.85
    explicit_editorial_override_field: explicit_editorial_override
  skim:
    personal_score_min: 0.72
    global_score_min: 0.85
  archive:
    personal_score_min: 0.45
    global_score_min: 0.55
    research_relevance_min: 0.18

boost_terms:
  - benchmark
  - dataset
  - open-source
  - open source
  - code release
  - github
  - evaluation
  - leaderboard
  - survey
  - scaling law
  - sota
  - reproducible
  - replication

negative_terms:
  - webinar
  - event registration
  - sponsor
  - sales
  - marketing
  - hiring

actionable_terms:
  - code
  - github
  - dataset
  - benchmark
  - leaderboard
  - evaluation
  - release
  - open-source
  - open source
  - framework
  - library
  - inference
  - serving
  - distillation
  - agent
  - tool
