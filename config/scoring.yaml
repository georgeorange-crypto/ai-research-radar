source_credibility:
  primary: 0.88
  aggregator: 0.72
  media: 0.62

official_hints:
  - arxiv.org
  - openreview.net
  - openai.com
  - anthropic.com
  - deepmind.google
  - research.google
  - meta.com
  - microsoft.com
