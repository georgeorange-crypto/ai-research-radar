mode: single
role_based_critic: true
critic_llm_enabled: false
role_pipeline_budget: 3
single_llm_budget: 3
max_evidence_chars: 1600
max_output_tokens: 250
cost_guard_enabled: true
daily_llm_budget_rmb: 1.0

roles:
  technical_extractor:
    provider: deepseek
    api_key: ${DEEPSEEK_API_KEY}
    base_url: https://api.deepseek.com
    model: deepseek-v4-flash

  relevance_judge:
    provider: kimi
    api_key: ${KIMI_API_KEY}
    base_url: https://api.moonshot.cn/v1
    model: moonshot-v1-8k

  critic:
    provider: glm
    api_key: ${GLM_API_KEY}
    base_url: https://open.bigmodel.cn/api/paas/v4
    model: glm-4.7-flash

  editor:
    provider: deepseek
    api_key: ${DEEPSEEK_API_KEY}
    base_url: https://api.deepseek.com
    model: deepseek-v4-flash

fallback:
  single_provider_order:
    - openai
    - deepseek
    - kimi
    - glm
