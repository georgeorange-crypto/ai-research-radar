# source_kind:
#   primary    = 论文、官方博客、官方会议/机构页面
#   aggregator = 聚合站或趋势榜
#   media      = 新闻信/媒体摘要
#
# source_role:
#   discovery              = 热点发现，只提高 freshness/community signal
#   paper_source           = 论文身份与摘要来源，可提高 credibility
#   editorial_analysis     = 编辑判断来源，提高 trend/interpretation signal
#   industry_analysis      = 产业/基础设施分析，提高 trend/industry signal
#   chinese_context        = 中文语境雷达，必须反查一手来源
#   community              = 社区线索，只提高 community signal
#   conference_authority   = 顶会官方/权威信号
#   institution_authority  = 强校/实验室/大厂官方信号
#   code_actionability     = 代码、复现、demo、benchmark 可行动性信号
sources:
  - id: hf_daily_papers
    name: Hugging Face Daily Papers
    type: hf_daily_papers
    source_kind: aggregator
    source_role: paper_source
    trust_level: high
    noise_level: medium
    region: global
    language: en
    update_frequency: daily
    url: https://huggingface.co/papers
    api_url: https://huggingface.co/api/daily_papers
    max_items: 40

  - id: arxiv_ai_ml
    name: arXiv AI/ML/NLP/Vision/Robotics
    type: arxiv
    source_kind: primary
    source_role: paper_source
    trust_level: high
    noise_level: low
    region: global
    language: en
    update_frequency: daily
    categories: [cs.AI, cs.LG, cs.CL, cs.CV, cs.RO, stat.ML]
    max_items: 120

  - id: openreview_core
    name: OpenReview
    type: openreview
    source_kind: primary
    source_role: [paper_source, conference_authority]
    trust_level: high
    noise_level: low
    region: global
    language: en
    update_frequency: daily
    max_items: 30
    venue_ids:
      - ICLR.cc/2026/Conference
      - ICLR.cc/2025/Conference
      - NeurIPS.cc/2025/Conference
      - ICML.cc/2025/Conference

  - id: papers_with_code_trending
    name: Papers with Code Trending (HF redirect)
    type: hf_papers_page
    source_kind: aggregator
    source_role: [paper_source, code_actionability]
    trust_level: medium_high
    noise_level: medium
    region: global
    language: en
    update_frequency: daily
    url: https://huggingface.co/papers/trending
    max_items: 30

  - id: github_ai_projects
    name: GitHub AI Research Projects
    type: github_search
    source_kind: aggregator
    source_role: code_actionability
    trust_level: medium_high
    noise_level: medium
    region: global
    language: en
    update_frequency: daily
    url: https://github.com/search
    max_items: 36
    max_items_per_query: 6
    pushed_after_days: 365
    sort: stars
    queries:
      - llm agent language:Python
      - context compression language:Python
      - long context llm language:Python
      - novel class discovery language:Python
      - open world learning language:Python
      - model distillation language:Python

