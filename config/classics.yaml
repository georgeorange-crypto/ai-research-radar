classic_papers:
  - title: Attention Is All You Need
    year: 2017
    authors: [Ashish Vaswani, Noam Shazeer, Niki Parmar, Jakob Uszkoreit, Llion Jones, Aidan N. Gomez, Lukasz Kaiser, Illia Polosukhin]
    topic_tags: [model_architecture, nlp, long_context, context_compression]
    url: https://arxiv.org/abs/1706.03762
    bibtex: vaswani2017attention
    why_classic: Transformer 把注意力机制推到序列建模中心，是今天长上下文、KV cache、稀疏注意力和大模型架构讨论的共同底座。
    prerequisite: 了解 encoder-decoder、attention 和基本序列建模。
    related_modern_keywords: [transformer, attention, long context, context window, KV cache, token efficiency, model architecture]

  - title: Transformer-XL
    year: 2019
    authors: [Zihang Dai, Zhilin Yang, Yiming Yang, Jaime Carbonell, Quoc V. Le, Ruslan Salakhutdinov]
    topic_tags: [context_compression, long_context, model_architecture]
    url: https://arxiv.org/abs/1901.02860
    bibtex: dai2019transformerxl
    why_classic: 它系统化处理长距离依赖和跨片段记忆，适合回看今天关于长上下文、状态压缩和记忆复用的新工作。
    prerequisite: 熟悉 Transformer 自注意力和语言模型训练。
    related_modern_keywords: [long context, memory, cache reuse, state compression, recurrence, context window]

