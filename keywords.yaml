classic_papers:
  - title: Attention Is All You Need
    year: 2017
    url: https://arxiv.org/abs/1706.03762
    sections: [architecture, nlp, context_memory]
    note: Transformer 架构奠基论文，适合连接长上下文、注意力稀疏化和现代大模型架构演进。
  - title: Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks
    year: 2020
    url: https://arxiv.org/abs/2005.11401
    sections: [context_memory, nlp]
    note: RAG 奠基工作之一，适合对照当前记忆、检索压缩和长上下文方案。
  - title: "ReAct: Synergizing Reasoning and Acting in Language Models"
    year: 2022
    url: https://arxiv.org/abs/2210.03629
    sections: [agents]
    note: LLM agent 推理-行动范式的代表工作，可与工具调用、规划和网页代理新成果对照。
  - title: Toolformer
    year: 2023
    url: https://arxiv.org/abs/2302.04761
    sections: [agents]
    note: 早期系统化讨论语言模型自监督学习使用工具的工作。
  - title: Distilling the Knowledge in a Neural Network
    year: 2015
    url: https://arxiv.org/abs/1503.02531
    sections: [distillation_efficiency]
    note: 知识蒸馏经典起点，适合对照当前小模型、压缩和高效训练方法。
  - title: "LoRA: Low-Rank Adaptation of Large Language Models"
    year: 2021
    url: https://arxiv.org/abs/2106.09685
    sections: [distillation_efficiency]
    note: 参数高效微调代表工作，连接高效训练、模型压缩和部署成本。
  - title: OpenMax
    year: 2015
    url: https://arxiv.org/abs/1511.06233
    sections: [open_world]
    note: 开集识别经典工作，适合对照 open-world、OOD 和未知类发现。
  - title: iCaRL
    year: 2016
    url: https://arxiv.org/abs/1611.07725
    sections: [open_world]
    note: 类增量学习经典方法，适合连接 continual learning 和 novel class discovery。
  - title: Deep Residual Learning for Image Recognition
    year: 2015
    url: https://arxiv.org/abs/1512.03385
    sections: [cv, architecture]
    note: ResNet 是现代视觉模型训练和架构设计的基础参照点。
  - title: Proximal Policy Optimization Algorithms
    year: 2017
    url: https://arxiv.org/abs/1707.06347
    sections: [rl]
    note: PPO 是 RL 和 RLHF 语境下仍频繁出现的基础算法。
  - title: Learning Transferable Visual Models From Natural Language Supervision
    year: 2021
    url: https://arxiv.org/abs/2103.00020
    sections: [cv, nlp, learning_methods]
    note: CLIP 是视觉语言表示学习的关键基线。
  - title: The Lottery Ticket Hypothesis
    year: 2018
    url: https://arxiv.org/abs/1803.03635
    sections: [distillation_efficiency, learning_methods]
    note: 稀疏化和模型压缩方向的重要思想来源。
