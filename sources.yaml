# source_kind:
#   primary    = 论文、官方博客、官方会议/机构页面
#   aggregator = 聚合站或趋势榜
#   media      = 新闻信/媒体摘要
sources:
  - id: hf_daily_papers
    name: Hugging Face Daily Papers
    type: hf_daily_papers
    source_kind: aggregator
    url: https://huggingface.co/papers
    api_url: https://huggingface.co/api/daily_papers
    max_items: 40

  - id: arxiv_ai_ml
    name: arXiv AI/ML/NLP/Vision/Robotics
    type: arxiv
    source_kind: primary
    categories: [cs.AI, cs.LG, cs.CL, cs.CV, cs.RO, stat.ML]
    max_items: 120

  - id: openreview_core
    name: OpenReview
    type: openreview
    source_kind: primary
    max_items: 30
    venue_ids:
      - ICLR.cc/2026/Conference
      - ICLR.cc/2025/Conference
      - NeurIPS.cc/2025/Conference
      - ICML.cc/2025/Conference

  - id: papers_with_code_trending
    name: Papers with Code Trending (HF redirect)
    type: hf_papers_page
    source_kind: aggregator
    url: https://huggingface.co/papers/trending
    max_items: 30

  - id: openai_news
    name: OpenAI News
    type: rss
    source_kind: primary
    url: https://openai.com/news/rss.xml
    max_items: 15

  - id: anthropic_news
    name: Anthropic News
    type: html_links
    source_kind: primary
    url: https://www.anthropic.com/news
    max_items: 15
    selectors:
      item: "article, li, .PostCard, [data-testid='post-card']"
      title: "h2, h3, a"
      summary: "p"

  - id: google_deepmind_blog
    name: Google DeepMind Blog
    type: rss
    source_kind: primary
    url: https://deepmind.google/blog/rss.xml
    max_items: 15

  - id: google_research_blog
